<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap');
    ]]></style>
    <filter id="touch-rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="3" seed="11"/>
      <feDisplacementMap in="SourceGraphic" scale="1"/>
    </filter>
  </defs>

  <!-- Rounded-square parchment background (iOS rounds the corners itself) -->
  <rect width="180" height="180" fill="#F5F0E8"/>

  <g transform="translate(90 90)" filter="url(#touch-rough)">
    <circle cx="0" cy="0" r="76" fill="none" stroke="#8B3A2E" stroke-width="2.2" opacity="0.92"/>
    <circle cx="0" cy="0" r="65" fill="none" stroke="#8B3A2E" stroke-width="0.9" opacity="0.6"  stroke-dasharray="4 3"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="#8B3A2E" stroke-width="0.7" opacity="0.45" stroke-dasharray="2 2"/>

    <line x1="0"   y1="-66" x2="0"   y2="-78" stroke="#8B3A2E" stroke-width="1.1" opacity="0.6" stroke-linecap="round"/>
    <line x1="0"   y1="66"  x2="0"   y2="78"  stroke="#8B3A2E" stroke-width="1.1" opacity="0.6" stroke-linecap="round"/>
    <line x1="-66" y1="0"   x2="-78" y2="0"   stroke="#8B3A2E" stroke-width="1.1" opacity="0.6" stroke-linecap="round"/>
    <line x1="66"  y1="0"   x2="78"  y2="0"   stroke="#8B3A2E" stroke-width="1.1" opacity="0.6" stroke-linecap="round"/>

    <text x="0" y="20" text-anchor="middle" fill="#8B3A2E" font-family="'Cormorant Garamond', Georgia, serif" font-size="64" font-style="italic" opacity="0.95">輪</text>
  </g>
</svg>
